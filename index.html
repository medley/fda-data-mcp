<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FDA Data MCP</title>
  <meta name="description" content="Hosted MCP server for FDA regulatory, manufacturing, and compliance intelligence.">
  <meta http-equiv="refresh" content="0; url=https://www.regdatalab.com/connect.md">
  <link rel="canonical" href="https://www.regdatalab.com/connect.md">
  <meta property="og:title" content="FDA Data MCP">
  <meta property="og:description" content="Connect AI agents to hosted FDA regulatory and manufacturing intelligence.">
  <meta property="og:url" content="https://www.regdatalab.com/connect.md">
  <meta property="og:image" content="https://raw.githubusercontent.com/medley/fda-data-mcp/main/assets/regdatalab-og.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="./assets/regdatalab-icon-refined.svg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #0e1b2e;
      --text: #e5eef9;
      --muted: #9fb3ca;
      --accent: #7dd3fc;
      --line: #1e3550;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.18), transparent 35%),
        linear-gradient(180deg, #07111f 0%, #0a1526 100%);
      color: var(--text);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(640px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(14, 27, 46, 0.92);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }
    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 14px;
      border-radius: 999px;
    }
    a.primary {
      background: var(--accent);
      color: #04111d;
      border-color: transparent;
      font-weight: 600;
    }
    code {
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <main>
    <img src="./assets/regdatalab-logo-dark-refined.svg" alt="RegData Lab" width="280" style="margin-bottom:16px">
    <h1>FDA Data MCP</h1>
    <p>
      This public repo is the install and discovery layer for the hosted FDA Data MCP product.
      You are being redirected to the canonical connect guide.
    </p>
    <p>
      Hosted endpoint: <code>https://www.regdatalab.com/mcp</code>
    </p>
    <div class="links">
      <a class="primary" href="https://www.regdatalab.com/connect.md">Open connect guide</a>
      <a href="https://www.regdatalab.com/docs">Docs</a>
      <a href="https://www.regdatalab.com/pricing">Pricing</a>
      <a href="https://www.regdatalab.com/signup">Signup</a>
    </div>
  </main>
</body>
</html>
