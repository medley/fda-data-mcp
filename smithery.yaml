# Smithery configuration for the hosted FDA Data MCP server.

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: Your FDA Data MCP API key from regdatalab.com/signup.
  commandFunction:
    |-
    config => ({
      command: 'npx',
      args: [
        '-y',
        'fda-data-mcp'
      ],
      env: {
        FDA_DATA_API_KEY: config.apiKey
      }
    })
