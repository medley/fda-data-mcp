<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RegDataLab Open Graph image</title>
  <desc id="desc">RegDataLab social card with refined stacked data layers icon and tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1B47"/>
      <stop offset="100%" stop-color="#08122E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 180) rotate(28) scale(620 360)">
      <stop offset="0%" stop-color="#113E8A" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#113E8A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconStroke" x1="224" y1="118" x2="462" y2="378" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#55D6FF"/>
      <stop offset="100%" stop-color="#2D93FF"/>
    </linearGradient>
    <style>
      .brand { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 74px; font-weight: 600; letter-spacing: -0.05em; }
      .tag { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 28px; font-weight: 400; letter-spacing: -0.02em; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g fill="none" stroke="url(#iconStroke)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" transform="translate(128 126)">
    <polygon points="154,24 248,66 154,108 60,66"/>
    <polyline points="60,98 60,151 154,193 248,151 248,98"/>
    <line x1="60" y1="98" x2="154" y2="140"/>
    <line x1="248" y1="98" x2="154" y2="140"/>
    <polyline points="60,154 60,207 154,249 248,207 248,154" opacity="0.96"/>
    <line x1="60" y1="154" x2="154" y2="196" opacity="0.96"/>
    <line x1="248" y1="154" x2="154" y2="196" opacity="0.96"/>
  </g>

  <text x="458" y="297" class="brand" fill="#E8EEF8">RegData</text>
  <text x="866" y="297" class="brand" fill="#4CBFFF">Lab</text>
  <text x="460" y="356" class="tag" fill="#9FB0C8">AI regulatory data infrastructure for manufacturing and compliance intelligence</text>
</svg>
