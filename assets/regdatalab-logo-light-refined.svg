<svg width="520" height="140" viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RegDataLab logo light</title>
  <desc id="desc">Refined stacked data layers icon with RegDataLab wordmark for light backgrounds.</desc>
  <defs>
    <linearGradient id="iconStroke" x1="24" y1="14" x2="98" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2AADE8"/>
      <stop offset="100%" stop-color="#1E77D3"/>
    </linearGradient>
    <style>
      .word { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 34px; font-weight: 500; letter-spacing: -0.04em; }
    </style>
  </defs>

  <g transform="translate(22 20)" fill="none" stroke="url(#iconStroke)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="48,6 84,22 48,38 12,22"/>
    <polyline points="12,34 12,57 48,73 84,57 84,34"/>
    <line x1="12" y1="34" x2="48" y2="50"/>
    <line x1="84" y1="34" x2="48" y2="50"/>
    <polyline points="12,58 12,82 48,98 84,82 84,58" opacity="0.96"/>
    <line x1="12" y1="58" x2="48" y2="74" opacity="0.96"/>
    <line x1="84" y1="58" x2="48" y2="74" opacity="0.96"/>
  </g>

  <text x="138" y="79" class="word" fill="#0F1F39">RegData</text>
  <text x="337" y="79" class="word" fill="#249FE3">Lab</text>
</svg>
