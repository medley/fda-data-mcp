name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run wrapper tests
        run: npm test

      - name: Verify wrapper help output
        run: node bin/fda-data-mcp.js --help

      - name: Verify package can be packed
        run: npm run pack:check

      - name: Validate JSON metadata
        run: |
          jq empty server.json
          jq empty glama.json

      - name: Validate Smithery YAML
        run: npx -y yaml valid smithery.yaml

      - name: Verify canonical MCP endpoint references
        run: |
          grep -q "https://www.regdatalab.com/mcp" README.md
          grep -q "https://www.regdatalab.com/connect.md" README.md
          grep -q "https://www.regdatalab.com/connect.md" index.html
